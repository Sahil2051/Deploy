# Render Blueprint: PostgreSQL + Node API.
# Import this repo in Render → Blueprints → New Blueprint Instance.
#
# Manual Web Service settings (if not using Blueprint):
#   Root Directory: server
#   Build Command:  npm install
#   Start Command:  npm start
# Do NOT set Start Command to "/" — that causes: bash: /: Is a directory (exit 126).
# If Root Directory is empty (repo root), use: Build npm run build, Start npm start
#
# After deploy:
# 1. Run migrations once: Shell for shelter-api → cd server && npm run db:schema
# 2. Set secrets in the dashboard:
#    - FRONTEND_URL = the deployed frontend URL (for example, https://your-frontend.onrender.com)
#    - PASSWORD_RESET_FRONTEND_URL = the same frontend URL if password reset links should land in the UI
#    - GOOGLE_REDIRECT_URI = the API callback URL, for example https://your-api.onrender.com/api/auth/google/callback
#    - GOOGLE_*, SMTP_* = your live credentials
#    - SIGNUP_OTP_DEBUG = true (temporary only) to include OTP in API response for troubleshooting mail delivery
# 3. For the Vite app (ut-frontend), add a Static Site with build "npm install && npm run build",
#    publish "dist", and set VITE_API_BASE_URL to https://<your-api-host>/api at build time.
# 4. Do not point FRONTEND_URL at the API service itself; that will keep the root URL on the backend.

databases:
  - name: shelter-postgres
    databaseName: shelter_auth
    user: shelter
    plan: free

services:
  - type: web
    name: shelter-api
    runtime: node
    rootDir: server
    buildCommand: npm install
    # Ensure tables exist before the app starts (safe because schema uses IF NOT EXISTS).
    preDeployCommand: npm run db:schema
    startCommand: npm start
    healthCheckPath: /health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        fromDatabase:
          name: shelter-postgres
          property: connectionString
      - key: PGSSLMODE
        value: require
      - key: FRONTEND_URL
        # Set this to the deployed frontend URL, not the API service URL.
        sync: false
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_REDIRECT_URI
        sync: false
      - key: SMTP_HOST
        sync: false
      - key: SMTP_PORT
        sync: false
      - key: SMTP_USER
        sync: false
      - key: SMTP_PASS
        sync: false
      - key: SMTP_FROM
        sync: false

  - type: web
    name: shelter-frontend
    runtime: static
    rootDir: ut-frontend
    buildCommand: npm install && npm run build
    staticPublishPath: ./dist
    envVars:
      - key: VITE_API_BASE_URL
        # Must point at the deployed backend hostname + /api.
        sync: false
